services:
  echolist-backend:
    image: onefivefour/echolist-backend:latest  # Replace with your actual Docker Hub username
    ports:
      - "9090:8080"  # Change the first port to expose on different host port (e.g., "9090:8080")
    volumes:
      - ./data:/app/data  # Change ./data to your preferred host directory for persistent storage
      - ./auth:/app/auth  # Auth credentials stored separately from data
    environment:
      - DATA_DIR=/app/data
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - AUTH_DEFAULT_USER=${AUTH_DEFAULT_USER:-admin}
      - AUTH_DEFAULT_PASSWORD=${AUTH_DEFAULT_PASSWORD:?AUTH_DEFAULT_PASSWORD is required}
      - ACCESS_TOKEN_EXPIRY_MINUTES=${ACCESS_TOKEN_EXPIRY_MINUTES:-15}
      - REFRESH_TOKEN_EXPIRY_MINUTES=${REFRESH_TOKEN_EXPIRY_MINUTES:-10080}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
