services:
  notes-backend:
    image: onefivefour/notes-backend:latest  # Replace with your actual Docker Hub username
    ports:
      - "9090:8080"  # Change the first port to expose on different host port (e.g., "9090:8080")
    volumes:
      - ./data:/app/data  # Change ./data to your preferred host directory for persistent storage
    environment:
      - DATA_DIR=/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
